name: PR Gate

on:
  pull_request:
  push:
    branches:
      - main
      - development

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      CHANNEL_SENDER_TRANSPORT: sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run launch gate
        run: npm run test:gate
