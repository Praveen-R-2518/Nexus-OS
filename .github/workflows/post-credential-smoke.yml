name: Post-credential smoke

# Manual smoke tests that require real third-party credentials configured as
# GitHub Actions secrets in the repository settings (Settings → Secrets and variables → Actions).
#
# Required secrets (by suite):
#   openai — OPENAI_API_KEY
#   gmail  — GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, ENCRYPTION_KEY, SUPABASE_* (see .env.example)
#   meta   — META_APP_ID, META_APP_SECRET, META_WEBHOOK_VERIFY_TOKEN, SUPABASE_*

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Credential suite to smoke-test
        required: true
        type: choice
        options:
          - openai
          - gmail
          - meta

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      CHANNEL_SENDER_TRANSPORT: sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: OpenAI smoke
        if: inputs.suite == 'openai'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run test:openai-smoke

      - name: Gmail smoke (placeholder)
        if: inputs.suite == 'gmail'
        run: |
          echo "Configure GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, ENCRYPTION_KEY, and Supabase secrets, then add npm run test:gmail-sync / test:send-e2e steps here."

      - name: Meta smoke (placeholder)
        if: inputs.suite == 'meta'
        run: |
          echo "Configure META_APP_ID, META_APP_SECRET, META_WEBHOOK_VERIFY_TOKEN, and Supabase secrets, then add npm run test:meta-send / test:meta-routing steps here."
